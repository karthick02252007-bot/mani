<script>

fetch("http://localhost:5000/api/products")
.then(res => res.json())
.then(data => {

    let output = "";

    data.forEach(watch => {

        output += `
        <figure>
            <img src="${watch.image}">
            <figcaption>
                <h3>${watch.name}</h3>
                <p>₹${watch.price}</p>
                <button onclick="buyNow()">Buy Now</button>
            </figcaption>
        </figure>
        `;

    });

    document.getElementById("watchContainer").innerHTML = output;

});

function buyNow(){
    alert("Watch Added Successfully!");
}
<article id="watchContainer"></article>
</script>
